*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --navy:#050d1a;
  --navy-mid:#0a1628;
  --blue:#1a6fff;
  --electric:#3d9bff;
  --neon:#00d4ff;
  --violet:#7c3aed;
  --white:#f0f6ff;
  --muted:#8ba3c0;
  --glass-border:rgba(255,255,255,0.08);
}

html,body{
  height:100%;
  background:var(--navy);
  color:var(--white);
  font-family:'Plus Jakarta Sans',sans-serif;
  overflow:hidden;
}

body{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:2rem;
  text-align:center;
  min-height:100vh;
  position:relative;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background:radial-gradient(ellipse 60% 50% at 50% 45%, rgba(26,111,255,.07) 0%, transparent 70%);
  pointer-events:none;
}

.star{
  position:fixed;
  border-radius:50%;
  background:#fff;
  opacity:.12;
  animation:starBlink 3s ease-in-out infinite;
}
@keyframes starBlink{0%,100%{opacity:.08}50%{opacity:.22}}

.logo{
  font-family:'Outfit',sans-serif;
  font-size:1.6rem;
  font-weight:900;

  opacity:0;
  animation:fadeUp .6s cubic-bezier(.16,1,.3,1) .1s forwards;
}
.logo-o{
  font-weight:200;
  color:rgba(255,255,255,.2);
  margin:0 3px;
}
.logo-sub{
  font-size:.52rem;
  font-weight:400;
  letter-spacing:5px;
  color:rgba(204,214,246,.25);
  display:block;
  text-align:center;
  margin-top:2px;
}

.error-code{
  font-family:'Outfit',sans-serif;
  font-size:clamp(5rem,20vw,10rem);
  font-weight:900;
  letter-spacing:-6px;
  line-height:.9;
  background:linear-gradient(135deg,var(--electric),var(--neon),#a855f7);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  opacity:0;
  animation:fadeUp .6s cubic-bezier(.16,1,.3,1) .2s forwards;
  margin-bottom:.5rem;
}

.deco-line{
  width:40px;
  height:2px;
  background:linear-gradient(90deg,var(--blue),var(--neon));
  border-radius:2px;
  margin:0 auto 1.5rem;
  opacity:0;
  animation:fadeUp .5s ease .35s forwards;
}

.title{
  font-family:'Outfit',sans-serif;
  font-size:clamp(1.4rem,4vw,2rem);
  font-weight:800;
  letter-spacing:-1px;
  line-height:1.2;
  margin-bottom:.9rem;
  opacity:0;
  animation:fadeUp .6s cubic-bezier(.16,1,.3,1) .4s forwards;
}

.body-text{
  font-size:clamp(.88rem,1.5vw,1rem);
  color:var(--muted);
  line-height:1.75;
  font-weight:300;
  max-width:400px;
  margin:0 auto 2.2rem;
  opacity:0;
  animation:fadeUp .6s cubic-bezier(.16,1,.3,1) .5s forwards;
}

.path-display{
  font-family:'Outfit',sans-serif;

  max-width:360px;
  overflow:hidden;
  text-overflow:ellipsis;

  animation:fadeUp .5s ease .55s forwards;
}

.btn-home{
  display:inline-flex;

  gap:.5rem;
  padding:.85rem 2rem;

  background:linear-gradient(135deg,var(--blue),var(--violet));

  font-family:'Outfit',sans-serif;
  font-size:.95rem;
  font-weight:600;
  text-decoration:none;
  border:none;
  cursor:pointer;
  box-shadow:0 4px 30px rgba(26,111,255,.4);
  transition:transform .3s,box-shadow .3s;
  opacity:0;
  animation:fadeUp .6s cubic-bezier(.16,1,.3,1) .6s forwards;
}
.btn-home:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 40px rgba(26,111,255,.6);
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}
</style>
</head>
